name: Release

on:
  push:
    tags:
      - 'release/*'

jobs:
  package:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
          - os: macos-13
            target: darwin-x64
          - os: windows-latest
            target: win32-x64
          - os: ubuntu-latest
            target: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libudev-dev libusb-1.0-0-dev

      - name: Install dependencies
        run: npm ci

      - name: Resolve VS Code Electron version
        id: electron
        shell: bash
        run: |
          VERSION=$(curl -fsSL https://raw.githubusercontent.com/microsoft/vscode/main/package.json \
            | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).devDependencies.electron.replace(/^\D+/,'')))")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Electron version: $VERSION"

      - name: Rebuild native modules for VS Code Electron
        run: npx @electron/rebuild -w node-hid -v ${{ steps.electron.outputs.version }}

      - name: Package extension
        run: npx @vscode/vsce package --target ${{ matrix.target }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
          path: "*.vsix"

  release:
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          merge-multiple: true

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#release/}"
          gh release create "$TAG" \
            --title "v${VERSION}" \
            --generate-notes \
            ethos-vscode-extension-*.vsix
