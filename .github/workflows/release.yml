name: Release

on:
  push:
    tags:
      - 'release/*'
  workflow_dispatch:
    inputs:
      target:
        description: 'VSIX target to build'
        type: choice
        required: true
        default: linux-x64
        options:
          - all
          - darwin-arm64
          - darwin-x64
          - win32-x64
          - linux-x64
      tag:
        description: 'Optional release tag (example: release/0.6.4). If set, create/update release.'
        type: string
        required: false

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
            rebuild_arch: arm64
          - os: macos-latest
            target: darwin-x64
            rebuild_arch: x64
          - os: windows-latest
            target: win32-x64
            rebuild_arch: x64
          - os: ubuntu-latest
            target: linux-x64
            rebuild_arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Select targets for manual runs
        id: selection
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TARGET: ${{ github.event.inputs.target }}
          MATRIX_TARGET: ${{ matrix.target }}
        run: |
          SHOULD_RUN=true
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$INPUT_TARGET" != "all" ] && [ "$INPUT_TARGET" != "$MATRIX_TARGET" ]; then
            SHOULD_RUN=false
          fi
          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.selection.outputs.should_run == 'true'

      - name: Verify package version matches lockfile
        if: steps.selection.outputs.should_run == 'true'
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          LOCK_VERSION=$(node -p "require('./package-lock.json').version")
          LOCK_PACKAGE_VERSION=$(node -p "require('./package-lock.json').packages[''].version")

          if [ "$PACKAGE_VERSION" != "$LOCK_VERSION" ] || [ "$PACKAGE_VERSION" != "$LOCK_PACKAGE_VERSION" ]; then
            echo "package.json version ($PACKAGE_VERSION) is out of sync with package-lock.json ($LOCK_VERSION / $LOCK_PACKAGE_VERSION)." >&2
            echo "Run npm run refresh-lock after bumping the package version." >&2
            exit 1
          fi

      - uses: actions/setup-node@v4
        if: steps.selection.outputs.should_run == 'true'
        with:
          node-version: '20'

      # node-gyp 10+ no longer works with Python 3.12 (distutils removed),
      # and macos-latest / windows-latest now ship 3.12+. Pin to 3.11.
      - uses: actions/setup-python@v5
        if: steps.selection.outputs.should_run == 'true'
        with:
          python-version: '3.11'

      - name: Install Linux native dependencies
        if: steps.selection.outputs.should_run == 'true' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            pkg-config \
            libudev-dev \
            libusb-1.0-0 \
            libusb-1.0-0-dev

      - name: Configure MSVC (Windows)
        if: steps.selection.outputs.should_run == 'true' && runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v2

      # Skip install scripts so node-hid is NOT compiled against the Node version
      # we set up above — we'll rebuild it explicitly against Electron below.
      - name: Install dependencies
        if: steps.selection.outputs.should_run == 'true'
        run: npm ci --ignore-scripts

      - name: Resolve VS Code Electron version
        if: steps.selection.outputs.should_run == 'true'
        id: electron
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Use VS Code's public update API (no auth, no rate limit) to get the
          # latest stable commit, then read electron from that commit's package.json.
          COMMIT=$(curl -fsSL "https://update.code.visualstudio.com/api/update/darwin/stable/latest" \
            | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).version))")
          echo "VS Code stable commit: $COMMIT"
          VERSION=$(curl -fsSL "https://raw.githubusercontent.com/microsoft/vscode/${COMMIT}/package.json" \
            | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).devDependencies.electron.replace(/^\D+/,'')))")
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Electron version: $VERSION"

      - name: Cache electron headers
        if: steps.selection.outputs.should_run == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.electron-gyp
            ~/.cache/electron
            ~/Library/Caches/electron
          key: ${{ runner.os }}-${{ matrix.rebuild_arch }}-electron-${{ steps.electron.outputs.version }}

      - name: Rebuild node-hid for VS Code Electron
        if: steps.selection.outputs.should_run == 'true'
        shell: bash
        run: |
          ./node_modules/.bin/electron-rebuild \
            --version "${{ steps.electron.outputs.version }}" \
            --arch "${{ matrix.rebuild_arch }}" \
            --only node-hid \
            --force

      # Sanity check: the rebuilt binary must load. Skip cross-compiled darwin-x64
      # on arm64 runner (binary is the wrong arch for the host).
      - name: Verify node-hid binary
        if: steps.selection.outputs.should_run == 'true' && matrix.target != 'darwin-x64'
        shell: bash
        run: |
          node -e "const h=require('node-hid'); console.log('node-hid loaded; devices=', h.devices().length)" || {
            echo 'node-hid failed to load after rebuild' >&2
            exit 1
          }

      - name: Compile TypeScript
        if: steps.selection.outputs.should_run == 'true'
        run: npm run compile

      - name: Prune dev dependencies
        if: steps.selection.outputs.should_run == 'true'
        run: |
          npm prune --omit=dev --ignore-scripts
          npm pkg set scripts.vscode:prepublish="echo already compiled"

      - name: Trim node-hid package contents
        if: steps.selection.outputs.should_run == 'true'
        shell: bash
        run: |
          rm -rf \
            node_modules/node-hid/bin \
            node_modules/node-hid/hidapi \
            node_modules/node-hid/prebuilds \
            node_modules/node-hid/src
          rm -f node_modules/node-hid/binding.gyp
          # Linux builds can leave duplicate native addons under obj.target.
          rm -rf node_modules/node-hid/build/Release/obj.target
          find node_modules/node-hid/build -type f ! -name '*.node' -delete
          find node_modules/node-hid/build -type d -empty -delete

      - name: Package extension
        if: steps.selection.outputs.should_run == 'true'
        run: npx --yes @vscode/vsce package --target ${{ matrix.target }}

      - name: Upload VSIX artifact
        if: steps.selection.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
          path: "*.vsix"

  package-universal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Skip scripts — no native compilation needed
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Compile TypeScript
        run: npm run compile

      - name: Prune dev dependencies
        run: |
          npm prune --omit=dev --ignore-scripts
          npm pkg set scripts.vscode:prepublish="echo already compiled"

      # Remove the native addon entirely so the VSIX has no binary.
      # Use npm uninstall (not rm -rf) so node-hid is removed from both
      # node_modules and package.json, and its now-orphaned sub-dependencies
      # are pruned — otherwise vsce's `npm list --production` reports the
      # package as missing and the sub-deps as extraneous.
      - name: Remove node-hid
        run: npm uninstall node-hid --ignore-scripts

      - name: Package universal extension
        run: npx --yes @vscode/vsce package

      - name: Upload universal VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-universal
          path: "*.vsix"

  release:
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '') }}
    needs: [package, package-universal]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          merge-multiple: true

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          TAG="${INPUT_TAG}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#release/}"
          gh release create "$TAG" \
            --title "v${VERSION}" \
            --generate-notes \
            ethos-devtools-*.vsix

  publish:
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '') }}
    needs: [release]
    runs-on: ubuntu-latest

    steps:
      - name: Download all VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          merge-multiple: true

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          for vsix in ethos-devtools-*.vsix; do
            echo "Publishing $vsix"
            npx --yes @vscode/vsce publish --pat "$VSCE_PAT" --packagePath "$vsix"
          done
